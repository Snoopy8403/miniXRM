<div class="container">
  <h1>Partnerek</h1>

  <button mat-raised-button color="primary" (click)="openCreateDialog()">
    Új partner
  </button>

  <table mat-table [dataSource]="partners">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Név</th>
      <td mat-cell *matCellDef="let p">{{ p.name }}</td>
    </ng-container>

    <ng-container matColumnDef="taxNumber">
      <th mat-header-cell *matHeaderCellDef>Adószám</th>
      <td mat-cell *matCellDef="let p">{{ p.taxNumber }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Státusz</th>
      <td mat-cell *matCellDef="let p">{{ p.status }}</td>
    </ng-container>

    <ng-container matColumnDef="qualifications">
      <th mat-header-cell *matHeaderCellDef>Minősítések</th>
      <td mat-cell *matCellDef="let p">
        <mat-chip-set>
          <mat-chip *ngFor="let q of p.qualifications">
            {{ q }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>

      <td mat-cell *matCellDef="let p">
        <button mat-button color="primary" [routerLink]="['/partners', p.id]">
          Részletek
        </button>

        <button mat-button (click)="openEditDialog(p)">Szerkeszt</button>

        <button mat-button color="accent" (click)="toggleStatus(p)">
          {{ p.status === "ACTIVE" ? "Inaktivál" : "Aktivál" }}
        </button>

        <button mat-button color="warn" (click)="delete(p.id)">Törlés</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
